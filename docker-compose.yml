x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow_db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _PIP_ADDITIONAL_REQUIREMENTS: "snowflake-connector-python[pandas]==3.12.2 pandas==2.2.2 psycopg2-binary==2.9.9 dbt-snowflake==1.9.1"
    POSTGRES_SOURCE_HOST: ${POSTGRES_SOURCE_HOST:-postgres_source}
    POSTGRES_SOURCE_PORT: ${POSTGRES_SOURCE_PORT:-5432}
    POSTGRES_SOURCE_DB: ${POSTGRES_SOURCE_DB:-pacbook}
    POSTGRES_SOURCE_USER: ${POSTGRES_SOURCE_USER:-postgres}
    POSTGRES_SOURCE_PASSWORD: ${POSTGRES_SOURCE_PASSWORD:-mypassword}
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-SYSADMIN}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-PACBOOK_DWH}
    SNOWFLAKE_RAW_SCHEMA: ${SNOWFLAKE_RAW_SCHEMA:-RAW}
    SNOWFLAKE_DW_SCHEMA: ${SNOWFLAKE_DW_SCHEMA:-ANALYTICS}
    SNOWFLAKE_SNAPSHOT_SCHEMA: ${SNOWFLAKE_SNAPSHOT_SCHEMA:-SNAPSHOTS}
    SNOWFLAKE_QUERY_TAG: ${SNOWFLAKE_QUERY_TAG:-pacbook_elt}
    DBT_TARGET: ${DBT_TARGET:-dev}
    SCHEDULE_CRON: ${SCHEDULE_CRON:-0 2 * * *}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt:/opt/airflow/dbt
    - ./secrets:/opt/airflow/secrets:ro
  depends_on:
    airflow_db:
      condition: service_healthy
    postgres_source:
      condition: service_healthy

services:
  postgres_source:
    image: postgres:16
    container_name: pacbook-store-data
    environment:
      POSTGRES_DB: ${POSTGRES_SOURCE_DB:-pacbook}
      POSTGRES_USER: ${POSTGRES_SOURCE_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SOURCE_PASSWORD:-mypassword}
    ports:
      - "5433:5432"
    volumes:
      - ./data:/docker-entrypoint-initdb.d
      - postgres_source_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SOURCE_USER:-postgres} -d ${POSTGRES_SOURCE_DB:-pacbook}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow_db:
    image: postgres:16
    container_name: pacbook-airflow-db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: pacbook-airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username ${AIRFLOW_USERNAME:-admin} \
          --password ${AIRFLOW_PASSWORD:-admin} \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: pacbook-airflow-webserver
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: pacbook-airflow-scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler
    restart: unless-stopped

volumes:
  postgres_source_data:
  airflow_db_data:
